name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build-and-smoke:
    runs-on: windows-2022
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
          dotnet-quality: ga

      - name: Install Windows SDK 10.0.26100
        shell: pwsh
        run: |
          $vswhere    = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsInstaller = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vs_installer.exe"
          $installPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          & $vsInstaller modify --installPath "$installPath" `
            --add Microsoft.VisualStudio.Component.Windows11SDK.26100 `
            --quiet --norestart
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 3010) {
            throw "SDK install failed (exit $LASTEXITCODE)"
          }

      - name: Install Windows WDK 10.0.26100
        shell: pwsh
        run: |
          $wdkSetup = "$env:TEMP\wdksetup.exe"
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2272612" `
            -OutFile $wdkSetup -UseBasicParsing
          & $wdkSetup /features OptionId.WindowsDriverKit /q /norestart
          if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 3010) {
            throw "WDK install failed (exit $LASTEXITCODE)"
          }

      - name: Run CI surface
        shell: pwsh
        run: .\Scripts\ci-surface.ps1 -Configuration Debug -Platform x64
