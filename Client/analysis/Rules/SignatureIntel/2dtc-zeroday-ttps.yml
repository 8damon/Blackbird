title: 2Dtc Cloud Files Sync Root Placeholder Staging
id: blackbird.sigma.2dtc.cloudfiles_syncroot_placeholder_staging
status: experimental
description: Cloud Files sync-root and placeholder APIs were used in a chain commonly surrounding RedSun-style Defender rewrite abuse.
logsource:
  product: windows
detection:
  selection_api:
    ApiName|contains:
      - 'CfRegisterSyncRoot'
      - 'CfConnectSyncRoot'
      - 'CfCreatePlaceholders'
  selection_text:
    '*|contains':
      - 'CfRegisterSyncRoot'
      - 'CfConnectSyncRoot'
      - 'CfCreatePlaceholders'
      - 'SERIOUSLYMSFT'
  condition: selection_api or selection_text
level: high
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1106
  - attack.t1574
