title: 2Dtc Cloud Files Policy Registry Link Abuse
id: blackbird.sigma.2dtc.cloudfiles_policy_link_abuse
status: experimental
description: Cloud Files policy registry paths were modified in a way associated with abort-hydration registry-link privilege escalation chains.
logsource:
  product: windows
  category: registry_set
detection:
  selection_cloudfiles:
    TargetObject|contains:
      - '\Software\Policies\Microsoft\CloudFiles\BlockedApps'
      - '\Software\Policies\Microsoft\CloudFiles\SymbolicLinkValue'
  selection_policy_system:
    TargetObject|contains:
      - '\Software\Microsoft\Windows\CurrentVersion\Policies\System\DisableLockWorkstation'
  condition: selection_cloudfiles or selection_policy_system
level: critical
tags:
  - attack.privilege_escalation
  - attack.defense_evasion
  - attack.t1068
  - attack.t1112
---
title: 2Dtc DEFAULT Volatile Environment WER Hijack
id: blackbird.sigma.2dtc.default_volatile_environment_windir_hijack
status: experimental
description: The DEFAULT profile Volatile Environment windir value or a temp-backed fake WER path was observed.
logsource:
  product: windows
detection:
  selection_registry:
    TargetObject|contains:
      - '\Registry\User\.DEFAULT\Volatile Environment\windir'
      - '\.DEFAULT\Volatile Environment\windir'
  selection_wermgr_image:
    Image|contains:
      - '\Temp\'
      - '\AppData\Local\Temp\'
    Image|endswith:
      - '\System32\wermgr.exe'
  selection_wermgr_command:
    CommandLine|contains:
      - '\System32\wermgr.exe'
      - 'MiniPlasmaWERPipe'
  condition: selection_registry or selection_wermgr_image or selection_wermgr_command
level: critical
tags:
  - attack.privilege_escalation
  - attack.persistence
  - attack.t1068
  - attack.t1574
