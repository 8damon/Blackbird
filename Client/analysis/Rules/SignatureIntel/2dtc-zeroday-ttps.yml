title: 2Dtc Defender Signature Update RPC Abuse
id: blackbird.sigma.2dtc.defender_signature_update_rpc_abuse
status: experimental
description: Defender signature update RPC or object-manager staging names associated with BlueHammer-style update path redirection were observed.
logsource:
  product: windows
detection:
  selection_rpc_endpoint:
    '*|contains':
      - 'IMpService77BDAF73-B396-481F-9042-AD358843EC24'
      - 'ServerMpUpdateEngineSignature'
      - 'WDUpdateDirectory'
  selection_alpc:
    ApiName|contains:
      - 'NtAlpcConnectPort'
      - 'NtConnectPort'
    '*|contains':
      - 'IMpService'
  condition: selection_rpc_endpoint or selection_alpc
level: critical
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1106
  - attack.t1562.001
