title: 2Dtc Defender Definition VDM Tampering
id: blackbird.sigma.2dtc.defender_definition_vdm_tampering
status: experimental
description: File activity targeted Microsoft Defender definition update VDM/LKG assets.
logsource:
  product: windows
  category: file_event
detection:
  selection_definition_vdm:
    TargetFilename|re: '\\ProgramData\\Microsoft\\Windows Defender\\Definition Updates\\.*\\(mpavbase|mpasbase|mpengine|[^\\]+\.vdm|[^\\]+\.lkg)'
  selection_mrt:
    TargetFilename|contains:
      - '\Windows\System32\MRT\'
  condition: selection_definition_vdm or selection_mrt
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.001
