title: 2Dtc Suspicious Cloud Filter Or Defender FSCTL Chain
id: blackbird.sigma.2dtc.suspicious_cloudfilter_defender_fsctl_chain
status: experimental
description: Oplock, reparse-point, or Cloud Filter FSCTL activity was observed around privileged file or cloud placeholder manipulation.
logsource:
  product: windows
detection:
  selection_api:
    ApiName|contains:
      - 'NtFsControlFile'
      - 'NtDeviceIoControlFile'
  selection_fsctl_text:
    '*|contains':
      - 'FSCTL_REQUEST_BATCH_OPLOCK'
      - 'FSCTL_REQUEST_OPLOCK'
      - 'FSCTL_SET_REPARSE_POINT'
      - 'FSCTL_CLOUD'
      - 'CldFlt'
      - 'cldflt'
  condition: selection_api and selection_fsctl_text
level: high
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1106
  - attack.t1574.011
