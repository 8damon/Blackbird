title: 2Dtc RedSun Tiering Engine COM Launch
id: blackbird.sigma.2dtc.redsun_tiering_engine_com_launch
status: experimental
description: The Tiering Engine COM class or payload name used by RedSun-style chains was observed.
logsource:
  product: windows
detection:
  selection_com_guid:
    ApiName|contains:
      - 'CoCreateInstance'
    '*|contains':
      - '50d185b9-fff3-4656-92c7-e4018da4361d'
  selection_tiering_text:
    '*|contains':
      - 'TieringEngineService.exe'
      - 'REDSUN'
  condition: selection_com_guid or selection_tiering_text
level: high
tags:
  - attack.execution
  - attack.privilege_escalation
  - attack.t1559.001
