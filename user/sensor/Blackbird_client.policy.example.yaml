# BlackbirdClient policy (flat YAML-like key:value format).
# CLI positional args still work; CLI flags override this file.

target: path:R:\.NIGHTDAY\TTK\BlackbirdExampleDirectSyscallNtQueryVm.exe
streams: handle,memory,thread,filesystem
scope: both

log.format: jsonl
log.file: events.swk.jsonl
log.high_priority_file: high_priority.swk.jsonl
log.high_priority_min_severity: 4

output.ioctl_verbose: 0

filter.ioctl.handle: 1
filter.ioctl.thread: 1
filter.ioctl.filesystem: 1
filter.etw.blackbird: 1
filter.etw.ti: 1
